<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: system-ui, -apple-system, sans-serif; max-width: 600px; margin: 0 auto; padding: 24px; font-size: 14px; }
  h1 { font-size: 20px; margin-bottom: 16px; }
  .input-row { display: flex; gap: 8px; margin-bottom: 16px; }
  .input-row input { flex: 1; border: 1px solid #ddd; border-radius: 4px; padding: 7px 10px; font-size: 14px; outline: none; }
  .input-row input:focus { border-color: #1976d2; }
  button { cursor: pointer; border: 1px solid #ddd; border-radius: 4px; padding: 7px 14px; font-size: 13px; background: #fff; }
  button:hover { background: #f0f0f0; }
  button.primary { background: #1976d2; color: #fff; border-color: #1976d2; }
  button.primary:hover { background: #1565c0; }
  button.danger { color: #d32f2f; border-color: #d32f2f; }
  table { width: 100%; border-collapse: collapse; }
  th, td { text-align: left; padding: 8px 4px; border-bottom: 1px solid #eee; }
  th { font-size: 12px; color: #888; font-weight: 500; }
  td { font-size: 13px; word-break: break-all; }
  .empty { color: #aaa; text-align: center; padding: 32px 0; }
  .hint { font-size: 12px; color: #888; margin-top: 12px; line-height: 1.6; }
  .hint code { background: #f5f5f5; padding: 1px 5px; border-radius: 3px; font-size: 11px; }
</style>
</head>
<body>
<h1>URL Blocker 设置</h1>

<div class="input-row">
  <input type="text" id="newUrl" placeholder="输入要屏蔽的网址 / 域名 / 关键词" />
  <button class="primary" id="addBtn">添加</button>
</div>

<table>
  <thead><tr><th style="width:100%">规则</th><th></th></tr></thead>
  <tbody id="ruleList"><tr><td colspan="2" class="empty">暂无规则</td></tr></tbody>
</table>

<div class="hint">
  💡 导航到匹配规则的网址时，标签页将被直接关闭（不区分大小写，子串匹配）。<br>
  示例：<code>facebook.com</code> → 屏蔽所有含 <code>facebook.com</code> 的网址；<code>https://example.com/foo</code> → 精确屏蔽该路径。
</div>

<script src="options.js"></script>
</body>
</html>
